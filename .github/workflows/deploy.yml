name: Build and Deploy Frontend

on:
    push:
        branches:
            - master

env:
    DEPLOY_DIR: /opt/geotravels

jobs:
    test:
        name: Run Tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run tests
              run: npm run test:run

    deploy:
        name: Deploy to VPS
        runs-on: ubuntu-latest
        needs: test

        steps:
            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  script: |
                      cd ${{ env.DEPLOY_DIR }}/frontend
                      git pull
                      BUILD_ARGS=$(grep '^VITE_' ${{ env.DEPLOY_DIR }}/infra/prod/.env \
                        | sed 's/^/--build-arg /' \
                        | tr '\n' ' ')
                      docker build $BUILD_ARGS -t geotravels-frontend:local .
                      docker compose -f ${{ env.DEPLOY_DIR }}/infra/prod/docker-compose.prod.yml up -d --no-deps frontend
                      docker image prune -f
